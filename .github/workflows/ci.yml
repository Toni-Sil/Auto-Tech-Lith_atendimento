name: CI

on:
  push:
    branches: [main, develop, "fix/**", "feat/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Frontend Build (Tailwind local) ──────────────────────────────────────────────
  # O CSS compilado é gerado DENTRO do Docker build (Dockerfile multi-stage).
  # Este job valida que o build não quebra antes do merge.
  frontend:
    name: Frontend (Tailwind build check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build Tailwind CSS
        working-directory: frontend
        run: npm run build:css

      - name: Verify output exists
        run: test -f frontend/css/tailwind.min.css && echo "✅ tailwind.min.css gerado"

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit + safety
        run: pip install bandit safety
      - name: Bandit SAST
        run: bandit -r src/ -ll -ii --exclude src/tests || true
      - name: Safety dependency check
        run: safety check -r requirements.txt || true
