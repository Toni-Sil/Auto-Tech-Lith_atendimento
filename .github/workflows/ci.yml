name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Format Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          pip install flake8 black isort

      - name: Run Black (format check)
        run: black --check src/ tests/

      - name: Run isort (import sort check)
        run: isort --check-only src/ tests/

      - name: Run Flake8 (style)
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test
      APP_DEBUG: "True"
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      SECRET_KEY: test-secret-key-for-ci-only
      ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISE=
      OPENAI_API_KEY: sk-test-placeholder
      EVOLUTION_API_URL: http://localhost:8080
      EVOLUTION_SERVER_URL: http://localhost:8080
      EVOLUTION_API_KEY: test-key
      EVOLUTION_INSTANCE_NAME: test
      TELEGRAM_BOT_TOKEN: 0000000000:test
      TELEGRAM_CHAT_ID: "0"
      VERIFY_TOKEN: test-verify-token
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      PUBLIC_URL: http://localhost:8000
      METRICS_TOKEN: test-metrics
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --asyncio-mode=auto \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─── Docker Build ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: auto-tech-lith:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scan ───────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (dependency vulnerability scan)
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
