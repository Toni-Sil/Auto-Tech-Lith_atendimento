# Auto Tech Lith — Docker Compose
# Hospedagem: Hostinger VPS + Dokploy + Traefik
# Rede externa 'dokploy-network' é criada e gerenciada pelo Dokploy.

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-auto_tech_lith}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SEGURANCA: sem expose de porta — acesso apenas interno via auto_tech_network
    networks:
      - auto_tech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-auto_tech_lith}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - auto_tech_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Backend Application ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Dokploy faz o build automaticamente no deploy
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENV: production
      APP_DEBUG: "False"
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-auto_tech_lith}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      METRICS_TOKEN: ${METRICS_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_SERVER_URL: ${EVOLUTION_SERVER_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-default}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      VERIFY_TOKEN: ${VERIFY_TOKEN}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      PUBLIC_URL: ${PUBLIC_URL}
      RATE_LIMIT_WHITELIST: ${RATE_LIMIT_WHITELIST:-127.0.0.1}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/frontend/assets/uploads
    networks:
      - auto_tech_network
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # ── Traefik labels (Dokploy lê estes automaticamente) ──────────────────
    labels:
      - traefik.enable=true

      # ── HTTPS: todo o tráfego (frontend + API)
      - traefik.http.routers.atl-app.rule=Host(`${DOMAIN:-autotechlith.com}`)
      - traefik.http.routers.atl-app.entrypoints=websecure
      - traefik.http.routers.atl-app.tls=true
      - traefik.http.routers.atl-app.tls.certresolver=letsencrypt
      - traefik.http.routers.atl-app.service=atl-app
      - traefik.http.services.atl-app.loadbalancer.server.port=8000

      # ── HTTP → HTTPS redirect
      - traefik.http.routers.atl-http.rule=Host(`${DOMAIN:-autotechlith.com}`)
      - traefik.http.routers.atl-http.entrypoints=web
      - traefik.http.routers.atl-http.middlewares=atl-https-redirect
      - traefik.http.middlewares.atl-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.atl-https-redirect.redirectscheme.permanent=true

      # ── Compressão gzip
      - traefik.http.middlewares.atl-compress.compress=true
      - traefik.http.routers.atl-app.middlewares=atl-compress

      # ── Dokploy metadata
      - dokploy.managed=true

  # ─── pgAdmin (apenas com profile dev) ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@autotechlith.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      TZ: America/Sao_Paulo
    depends_on:
      - postgres
    networks:
      - auto_tech_network
    profiles:
      - dev

  # ─── Evolution API ───────────────────────────────────────────────────────────
  evolution-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-postgresql}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution}
      TZ: America/Sao_Paulo
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - auto_tech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_DB_USER:-postgresql}"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${EVOLUTION_REDIS_PASSWORD:-evo-redis-2026}
    volumes:
      - evolution_redis_data:/data
    networks:
      - auto_tech_network

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-https://evolution.autotechlith.com}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: pt
      NODE_ENV: production
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://${EVOLUTION_DB_USER:-postgresql}:${EVOLUTION_DB_PASSWORD}@evolution-postgres:5432/${EVOLUTION_DB_NAME:-evolution}
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${EVOLUTION_REDIS_PASSWORD:-evo-redis-2026}@evolution-redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      WEBHOOK_GLOBAL_URL: http://backend:8000/api/v1/webhooks/whatsapp?token=${VERIFY_TOKEN}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_EVENTS: APPLICATION_STARTUP,QRCODE_UPDATED,MESSAGES_SET,MESSAGES_UPSERT,MESSAGES_UPDATE,MESSAGES_DELETE,SEND_MESSAGE,CONNECTION_UPDATE,CALL
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    volumes:
      - evolution_instances:/Server/instances
      - evolution_store:/Server/store
    networks:
      - auto_tech_network
      - dokploy-network

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  backend_uploads:
  evolution_db_data:
  evolution_redis_data:
  evolution_instances:
  evolution_store:

networks:
  auto_tech_network:
    driver: bridge
  # Rede gerenciada pelo Dokploy — NÃO recriar aqui
  dokploy-network:
    external: true
