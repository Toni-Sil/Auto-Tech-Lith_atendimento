services:

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-auto_tech_lith}
      TZ: America/Sao_Paulo
    # SECURITY: do NOT expose port 5432 publicly on VPS — internal only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auto_tech_network

  # ─── Redis Cache ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis2026}
    # SECURITY: do NOT expose port 6379 publicly on VPS — internal only
    volumes:
      - redis_data:/data
    networks:
      - auto_tech_network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis2026}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Application ────────────────────────────────────────────────────────
  backend:
    build: .
    restart: always
    expose:
      - 8000
    environment:
      - ENV=production
      - APP_DEBUG=False
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-auto_tech_lith}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_SERVER_URL=${EVOLUTION_SERVER_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-default}
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - VERIFY_TOKEN=${VERIFY_TOKEN}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - PUBLIC_URL=${PUBLIC_URL}
      - METRICS_TOKEN=${METRICS_TOKEN}
      - RATE_LIMIT_WHITELIST=${RATE_LIMIT_WHITELIST:-127.0.0.1}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis2026}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - backend_logs:/app/logs
      - backend_uploads:/app/frontend/assets/uploads
    networks:
      - auto_tech_network
      - dokploy-network
    labels:
      - traefik.enable=true
      # Router frontend: serve tudo exceto /api/v1/ (HTML, CSS, JS, favicon, etc)
      - traefik.http.routers.frontend.rule=Host(`autotechlith.com`) && !PathPrefix(`/api/v1/`)
      - traefik.http.routers.frontend.service=backend
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      # Router API: serve /api/v1/*
      - traefik.http.routers.backend.rule=Host(`autotechlith.com`) && PathPrefix(`/api/v1/`)
      - traefik.http.routers.backend.service=backend
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      # Redirect HTTP → HTTPS
      - traefik.http.routers.http-catchall.rule=Host(`autotechlith.com`)
      - traefik.http.routers.http-catchall.entrypoints=web
      - traefik.http.routers.http-catchall.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
      - traefik.http.services.backend.loadbalancer.server.port=8000

  # ─── pgAdmin (Gerenciador visual do banco) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@autotechlith.com}
      # SEGURANÇA: sempre defina PGADMIN_PASSWORD no .env, nunca use o default em prod
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      TZ: America/Sao_Paulo
    depends_on:
      - postgres
    networks:
      - auto_tech_network
    profiles:
      - dev

  # ─── Evolution API PostgreSQL ──────────────────────────────────────────────────────
  evolution-postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${EVOLUTION_DB_USER:-postgresql}
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: ${EVOLUTION_DB_NAME:-evolution}
      TZ: America/Sao_Paulo
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - auto_tech_network

  # ─── Evolution API Redis ─────────────────────────────────────────────────────────────────
  evolution-redis:
    image: redis:7-alpine
    restart: always
    # SEGURANÇA: senha adicionada para isolar do redis do backend na mesma rede
    command: redis-server --requirepass ${EVOLUTION_REDIS_PASSWORD:-evo-redis-2026}
    volumes:
      - evolution_redis_data:/data
    networks:
      - auto_tech_network

  # ─── Evolution API ─────────────────────────────────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    expose:
      - 8080
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-https://evolution.autotechlith.com}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - LANGUAGE=pt
      - NODE_ENV=production
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://${EVOLUTION_DB_USER:-postgresql}:${EVOLUTION_DB_PASSWORD}@evolution-postgres:5432/${EVOLUTION_DB_NAME:-evolution}
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - CACHE_REDIS_ENABLED=true
      # URI atualizada com senha do evolution-redis
      - CACHE_REDIS_URI=redis://:${EVOLUTION_REDIS_PASSWORD:-evo-redis-2026}@evolution-redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - WEBHOOK_GLOBAL_URL=http://backend:8000/api/v1/webhooks/whatsapp?token=${VERIFY_TOKEN}
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,MESSAGES_SET,MESSAGES_UPSERT,MESSAGES_UPDATE,MESSAGES_DELETE,SEND_MESSAGE,CONNECTION_UPDATE,CALL
    depends_on:
      - evolution-postgres
      - evolution-redis
    volumes:
      - evolution_instances:/Server/instances
      - evolution_store:/Server/store
    networks:
      - auto_tech_network
      - dokploy-network

volumes:
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  evolution_db_data:
    driver: local
  evolution_redis_data:
    driver: local
  evolution_instances:
    driver: local
  evolution_store:
    driver: local

networks:
  auto_tech_network:
    driver: bridge
  dokploy-network:
    external: true
