version: '3.9'\n\nservices:\n  # PostgreSQL Database\n  postgres:\n    image: postgres:15-alpine\n    container_name: auto_tech_lith_db\n    environment:\n      POSTGRES_USER: ${DB_USER:-admin}\n      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}\n      POSTGRES_DB: ${DB_NAME:-auto_tech_lith}\n      TZ: America/Sao_Paulo\n    ports:\n      - \"${DB_PORT:-5432}:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U ${DB_USER:-admin}\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    networks:\n      - auto_tech_network\n\n  # FastAPI Backend\n  backend:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    container_name: auto_tech_lith_api\n    depends_on:\n      postgres:\n        condition: service_healthy\n    environment:\n      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-auto_tech_lith}\n      - ENV=${ENV:-development}\n      - DEBUG=${DEBUG:-True}\n      - OPENAI_API_KEY=${OPENAI_API_KEY}\n      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}\n      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://localhost:8080}\n      - NGROK_AUTH_TOKEN=${NGROK_AUTH_TOKEN}\n    ports:\n      - \"${API_PORT:-8000}:8000\"\n    volumes:\n      - ./src:/app/src\n      - ./logs:/app/logs\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:8000/health\"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n    networks:\n      - auto_tech_network\n    command: python -m src.main\n\n  # pgAdmin (Optional - Database Management)\n  pgadmin:\n    image: dpage/pgadmin4:latest\n    container_name: auto_tech_lith_pgadmin\n    environment:\n      PGADMIN_DEFAULT_EMAIL: admin@autotechlith.com\n      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}\n    ports:\n      - \"5050:80\"\n    depends_on:\n      - postgres\n    networks:\n      - auto_tech_network\n    profiles:\n      - dev\n\n  # Redis Cache (Optional)\n  redis:\n    image: redis:7-alpine\n    container_name: auto_tech_lith_redis\n    ports:\n      - \"6379:6379\"\n    networks:\n      - auto_tech_network\n    profiles:\n      - cache\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\nvolumes:\n  postgres_data:\n    driver: local\n\nnetworks:\n  auto_tech_network:\n    driver: bridge
