services:

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: auto_tech_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-auto_tech_lith}
      TZ: America/Sao_Paulo
    # SECURITY: do NOT expose port 5432 publicly on VPS — internal only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auto_tech_network

  # ─── Redis Cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auto_tech_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis2026}
    # SECURITY: do NOT expose port 6379 publicly on VPS — internal only
    volumes:
      - redis_data:/data
    networks:
      - auto_tech_network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis2026}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Application ──────────────────────────────────────────────────────
  backend:
    build: .
    container_name: auto_tech_backend
    restart: always
    environment:
      - ENV=production
      - APP_DEBUG=False
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD:-admin123}@postgres:5432/${DB_NAME:-auto_tech_lith}
      # A URL deve apontar para onde a Evolution estiver rodando no Dokploy
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_SERVER_URL=${EVOLUTION_SERVER_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-default}
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - VERIFY_TOKEN=${VERIFY_TOKEN}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost"]}
      - PUBLIC_URL=${PUBLIC_URL}
      - METRICS_TOKEN=${METRICS_TOKEN}
      - RATE_LIMIT_WHITELIST=${RATE_LIMIT_WHITELIST:-127.0.0.1}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis2026}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./frontend/assets/uploads:/app/frontend/assets/uploads
    networks:
      - auto_tech_network
      - dokploy-network

  # ─── pgAdmin (Gerenciador visual do banco) ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auto_tech_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@autotechlith.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      TZ: America/Sao_Paulo
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - auto_tech_network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  auto_tech_network:
    driver: bridge
  dokploy-network:
    external: true
